version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: backend/Dockerfile.txt
    container_name: xuanjian-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:mysql://host.docker.internal:3306/xuanjian?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8mb4
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 197412xukang
      SPRING_REDIS_HOST: host.docker.internal
      SPRING_REDIS_PORT: 6379
      SPRING_REDIS_PASSWORD: 197412
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - xuanjian-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.txt
    container_name: xuanjian-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - xuanjian-net

networks:
  xuanjian-net:
    driver: bridge